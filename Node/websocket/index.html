<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --message-bg: #334155;
            --border: #334155;
        }

        body { 
            margin: 0; 
            padding: 0;
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, var(--bg-color), #000000);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            background: rgba(30, 41, 59, 0.9);
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #10b981;
        }

        #messages { 
            list-style-type: none; 
            margin: 0; 
            padding: 24px; 
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbar */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        .message-item { 
            padding: 12px 16px; 
            border-radius: 18px;
            max-width: 80%;
            background: var(--message-bg);
            align-self: flex-start;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area { 
            padding: 20px 24px;
            background: rgba(30, 41, 59, 0.9);
            border-top: 1px solid var(--border);
        }

        #form { 
            display: flex; 
            gap: 12px;
        }

        #input { 
            border: 1px solid var(--border); 
            padding: 14px 20px; 
            flex-grow: 1; 
            border-radius: 99px; 
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        #input:focus { 
            outline: none; 
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }
        
        #input::placeholder {
            color: var(--text-muted);
        }

        #form > button { 
            background: var(--primary); 
            border: none; 
            padding: 0 24px; 
            border-radius: 99px; 
            color: #fff; 
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        #form > button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        #form > button:active {
            transform: translateY(1px);
        }

        /* Styling connection messages */
        .system-message {
            align-self: center !important;
            background: transparent !important;
            color: var(--text-muted);
            font-size: 0.8rem !important;
            box-shadow: none !important;
            padding: 4px 0 !important;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="status-dot"></div>
            <h1>Live Chat Hub</h1>
        </div>
        
        <ul id="messages"></ul>
        
        <div class="input-area">
            <form id="form" action="">
                <input id="input" autocomplete="off" placeholder="Type your message..." />
                <button>Send</button>
            </form>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // Ask for a username when they open the page
        let username = prompt("Welcome! Please enter your name:") || "Anonymous User";

        socket.on('connect', () => {
            addSystemMessage(`Connected to the chat server as ${username}`);
        });

        socket.on('disconnect', () => {
            addSystemMessage('Disconnected from server');
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                // Send an object containing both the user's name and the message
                socket.emit('chat message', { user: username, text: input.value.trim() });
                input.value = '';
                input.focus();
            }
        });

        socket.on('chat message', (msg) => {
            const item = document.createElement('li');
            item.className = 'message-item';
            
            // Format the message as "Username: The message text"
            item.innerHTML = `<strong>${msg.user}:</strong> ${msg.text}`;
            
            messages.appendChild(item);
            scrollToBottom();
        });

        function addSystemMessage(text) {
            const item = document.createElement('li');
            item.className = 'message-item system-message';
            item.textContent = text;
            messages.appendChild(item);
            scrollToBottom();
        }

        function scrollToBottom() {
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
